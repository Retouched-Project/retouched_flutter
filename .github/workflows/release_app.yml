name: Release App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Download Library Artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LIBRARY_REPO="Retouched-Project/bronze-monkey" 
          echo "Resolving latest tag from $LIBRARY_REPO..."
          TAG=$(gh release list -R "$LIBRARY_REPO" --limit 1 | cut -f1)
          
          echo "Downloading assets for $TAG from $LIBRARY_REPO..."
          gh release download "$TAG" -R "$LIBRARY_REPO" -p "bronze_monkey-android-jniLibs.zip"
          unzip bronze_monkey-android-jniLibs.zip -d android/app/src/main/
          rm bronze_monkey-android-jniLibs.zip

      - name: Build APK (Universal)
        run: flutter build apk --release

      - name: Build AppBundle
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Download Library Artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LIBRARY_REPO="Retouched-Project/bronze-monkey"
          echo "Resolving latest tag from $LIBRARY_REPO..."
          TAG=$(gh release list -R "$LIBRARY_REPO" --limit 1 | cut -f1)
          
          echo "Downloading assets for $TAG from $LIBRARY_REPO..."
          gh release download "$TAG" -R "$LIBRARY_REPO" -p "libbronze_monkey.a"
          
          mkdir -p bronze_monkey_ffi/ios/
          mv libbronze_monkey.a bronze_monkey_ffi/ios/

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Payload App
        run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r Runner.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: app-release-ipa
          path: Runner.ipa

  release:
    name: Create Release
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: app-release-apk

      - name: Download Android AAB
        uses: actions/download-artifact@v4
        with:
          name: app-release-aab

      - name: Download iOS IPA
        uses: actions/download-artifact@v4
        with:
          name: app-release-ipa

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app-release.apk
            app-release.aab
            Runner.ipa
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
